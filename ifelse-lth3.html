<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PENGKONDISIAN : IF ELSE pada JAVASCRIPT</title>
  </head>
  <body>
    <!-- syntax dasar if else -->
    <!-- if (kondisi) {
        aksi (blok kode) yang akan dijalankan jika kondisi bernilai true
      } 
        keluar dari blok kode jika kondisi bernilai false -->
    <!-- if (kondisi) {
        // blok kode jika kondisi bernilai true
      } else {
        // blok kode jika kondisi bernilai false
      } -->
    <script>
      let angka = 5;
      let noAngkot = 1;
      let angkotBeroperasi = 8;
      let jlmhAngkot = 10;

      if (angka === 1) {
        console.log("angka adalah 1");
      } else {
        console.log("angka bukan 1");
      }

      for (noAngkot; noAngkot <= jlmhAngkot; noAngkot++) {
        if (noAngkot <= angkotBeroperasi) {
          console.log("Angkot No. " + noAngkot + " beroperasi dengan baik.");
        } else {
          console.log("Angkot No. " + noAngkot + " sedang tidak beroperasi.");
        }
      }
    </script>
  </body>
</html>
